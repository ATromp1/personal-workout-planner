<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lift">
<title>Lift &amp; Eat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1c1917; background: #fafaf9; min-height: 100%;
  }
  body { padding-bottom: 84px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { padding: 20px 18px 12px; display: flex; justify-content: space-between; align-items: baseline; }
  h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { font-size: 12.5px; color: #78716c; }
  .saved { font-size: 11px; color: #16a34a; font-weight: 600; opacity: 0; transition: opacity .3s; }
  .saved.show { opacity: 1; }

  /* Tab bar */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid #ececea;
    display: flex; justify-content: space-around; padding: 8px 0 14px;
    z-index: 100;
  }
  .tabbar-inner { max-width: 480px; margin: 0 auto; display: flex; width: 100%; }
  .tabbtn {
    flex: 1; background: none; border: none; padding: 6px 4px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 11px; color: #a8a29e; cursor: pointer; font-weight: 600;
  }
  .tabbtn.active { color: #1c1917; }
  .tabbtn .ic {
    font-size: 22px; line-height: 1;
    filter: grayscale(1); opacity: 0.5;
  }
  .tabbtn.active .ic { filter: none; opacity: 1; }

  /* Section tabs (within a page) */
  .seg {
    display: flex; gap: 6px; padding: 0 12px 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .seg::-webkit-scrollbar { display: none; }
  .seg-btn {
    flex: 0 0 auto; padding: 8px 13px; border-radius: 999px;
    border: 1px solid #e7e5e4; background: #fff; color: #57534e;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .seg-btn.active { color: #fff; }

  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 16px 0; font-size: 11.5px; color: #a8a29e;
  }

  /* Cards */
  .card {
    background: #fff; margin: 12px 12px 0; border-radius: 14px;
    border: 1px solid #ececea; overflow: hidden;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 16px 6px; gap: 8px;
  }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-sub { font-size: 11.5px; color: #a8a29e; font-weight: 500; }

  /* Exercise / set rows */
  .ex-name-wrap { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .info-btn {
    flex: 0 0 auto; width: 19px; height: 19px; border-radius: 50%;
    border: 1px solid #d6d3d1; background: #fff; color: #78716c;
    font-size: 12px; font-weight: 700; font-style: italic; line-height: 1;
    cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .info-btn.open { background: #1c1917; color: #fff; border-color: #1c1917; }
  .how {
    display: none; margin: 0 14px 6px; padding: 10px 12px;
    background: #f7f6f4; border: 1px solid #ececea; border-radius: 10px;
    font-size: 13px; line-height: 1.5; color: #44403c;
  }
  .how.show { display: block; }
  .how .muscle {
    display: block; margin-top: 6px; font-size: 11.5px;
    color: #a8a29e; font-weight: 600;
  }
  .set-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px; }
  .set-label { font-size: 12px; color: #a8a29e; width: 42px; font-weight: 600; }
  .inp {
    flex: 1; min-width: 0; padding: 10px; font-size: 16px;
    border: 1px solid #e7e5e4; border-radius: 9px; background: #fafaf9;
    color: #1c1917; outline: none; text-align: center;
  }
  .inp:focus { border-color: #a8a29e; background: #fff; }
  .pad-b { padding-bottom: 8px; }

  /* Banners */
  .banner {
    margin: 12px 12px 0; padding: 16px; border-radius: 14px;
    background: #f5f3ff; border: 1px solid #e9d5ff; color: #6b21a8; font-size: 14px;
  }
  .banner ul { margin: 8px 0 0; padding-left: 18px; }
  .banner li { margin: 5px 0; line-height: 1.5; }
  .rest {
    margin: 12px 12px 0; padding: 20px 16px; border-radius: 14px;
    background: #f5f5f4; border: 1px solid #e7e5e4; color: #57534e;
    font-size: 14px; text-align: center;
  }
  .info-yellow {
    margin: 12px 12px 0; padding: 14px 16px; border-radius: 14px;
    background: #fef3c7; border: 1px solid #fde68a; color: #78350f;
    font-size: 13px; line-height: 1.5;
  }
  .info-green {
    margin: 12px 12px 0; padding: 14px 16px; border-radius: 14px;
    background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46;
    font-size: 13px; line-height: 1.5;
  }
  .info-red {
    margin: 12px 12px 0; padding: 14px 16px; border-radius: 14px;
    background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
    font-size: 13px; line-height: 1.5;
  }

  /* Targets */
  .targets { display: flex; gap: 8px; margin: 0 12px 4px; }
  .target-pill {
    flex: 1; background: #fff; border: 1px solid #ececea;
    border-radius: 12px; padding: 10px 12px; text-align: center;
  }
  .target-label { font-size: 10.5px; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .target-value { font-size: 17px; font-weight: 700; color: #1c1917; margin-top: 2px; }

  /* Meal-plan ingredient list */
  .ingredients { list-style: none; padding: 0 16px 6px; margin: 0; border-top: 1px solid #f5f5f4; }
  .ingredients li {
    padding: 8px 0; border-bottom: 1px solid #f5f5f4;
    font-size: 13.5px; line-height: 1.45;
    display: flex; justify-content: space-between; gap: 12px;
  }
  .ingredients li:last-child { border-bottom: none; }
  .qty { color: #78716c; flex: 0 0 auto; font-size: 12.5px; }
  .meal-notes {
    padding: 10px 16px 14px; font-size: 12.5px; color: #57534e;
    line-height: 1.5; background: #fafaf9; border-top: 1px solid #f5f5f4;
  }
  .macro-row { display: flex; gap: 14px; padding: 0 16px 12px; font-size: 11.5px; color: #78716c; }
  .macro-row b { color: #1c1917; font-weight: 700; }
  .totals {
    margin: 14px 12px 0; padding: 14px 16px;
    background: #1c1917; color: #fff; border-radius: 14px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .totals-label { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
  .totals-value { font-size: 16px; font-weight: 700; }

  /* Generic */
  details { margin: 12px 12px 0; background: #fff; border: 1px solid #ececea; border-radius: 14px; overflow: hidden; }
  details summary {
    padding: 14px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; list-style: none; display: flex;
    justify-content: space-between; align-items: center;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::after { content: "+"; font-size: 18px; color: #a8a29e; font-weight: 400; }
  details[open] summary::after { content: "−"; }
  details .body { padding: 0 16px 14px; font-size: 13.5px; line-height: 1.55; color: #44403c; }
  details .body p { margin-bottom: 8px; }
  details .body ul { padding-left: 18px; margin: 6px 0; }
  details .body li { margin: 4px 0; }

  /* Stats / intake screens */
  .progress-wrap { padding: 6px 16px 14px; }
  .progress-bar {
    height: 8px; background: #f5f5f4; border-radius: 99px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: #16a34a; transition: width .3s; }
  .progress-fill.over { background: #f59e0b; }
  .progress-fill.under { background: #2563eb; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #57534e; margin-top: 4px; }

  .add-row {
    display: flex; gap: 8px; padding: 8px 14px 12px;
  }
  .add-row .inp { flex: 1; }
  .btn {
    padding: 10px 14px; border-radius: 9px; border: 1px solid #1c1917;
    background: #1c1917; color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .btn-ghost { background: #fff; color: #1c1917; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }

  .log-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-top: 1px solid #f5f5f4;
    font-size: 13.5px;
  }
  .log-item .right { display: flex; align-items: center; gap: 12px; }
  .log-item .macros { color: #78716c; font-size: 12px; }
  .x-btn {
    background: none; border: none; color: #a8a29e; font-size: 18px;
    cursor: pointer; padding: 0 2px;
  }

  /* Weight chart */
  .chart-wrap { padding: 10px 14px 14px; }
  svg.chart { width: 100%; height: 160px; display: block; }

  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600; background: #f5f5f4; color: #57534e;
  }
  .pill.green { background: #ecfdf5; color: #065f46; }
  .pill.yellow { background: #fef3c7; color: #78350f; }
  .pill.red { background: #fef2f2; color: #991b1b; }

  .stat-row { display: flex; justify-content: space-between; padding: 12px 16px; border-top: 1px solid #f5f5f4; font-size: 14px; }
  .stat-row:first-child { border-top: none; }
  .stat-row b { font-weight: 700; }

  .empty {
    text-align: center; padding: 28px 16px; color: #a8a29e; font-size: 13px;
  }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 200;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; padding: 16px 16px 24px;
    max-height: 85vh; overflow-y: auto;
  }
  .modal h3 { font-size: 16px; margin-bottom: 12px; }
  .modal label { display: block; font-size: 12px; color: #57534e; margin: 10px 0 4px; font-weight: 600; }
  .modal .inp { width: 100%; text-align: left; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; }

  .food-pick {
    padding: 12px 14px; border-top: 1px solid #f5f5f4; font-size: 14px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
  }
  .food-pick:hover { background: #fafaf9; }
  .food-pick .macros { font-size: 12px; color: #78716c; }
  .food-pick:first-child { border-top: none; }

  hr.divider { border: none; border-top: 1px solid #ececea; margin: 14px 12px 0; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1 id="page-title">Workout</h1>
      <div class="sub" id="page-sub">Beginner muscle-building</div>
    </div>
    <span class="saved" id="saved">✓ Saved</span>
  </header>

  <div id="root"></div>
</div>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tabbtn" data-page="workout"><span class="ic">🏋️</span><span>Workout</span></button>
    <button class="tabbtn" data-page="meals"><span class="ic">🍽️</span><span>Meals</span></button>
    <button class="tabbtn" data-page="intake"><span class="ic">📝</span><span>Today</span></button>
    <button class="tabbtn" data-page="stats"><span class="ic">📈</span><span>Stats</span></button>
  </div>
</nav>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<script>
/* =========================
   DATA — workout & meal plan
   ========================= */

const PROGRAM = {

const STATE = {
  page: "workout",
  workout: { activeDay: todayKey() },
  meals: { activeDay: "a" },
  openHints: {},
  log: {},           // workout log
  intake: {},        // intake[dateKey] = [{ name, kcal, protein }, ...]
  weights: [],       // [{ date: "YYYY-MM-DD", kg: 70.2 }, ...]
  customFoods: [],   // [{ id, name, kcal, protein }]
};

function todayKey() {
  const map = { 1:"mon", 2:"tue", 3:"wed", 4:"thu", 5:"fri", 6:"sat", 0:"sat" };
  return map[new Date().getDay()];
}
function weekId() {
  const d = new Date();
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
  return d.getFullYear() + "-w" + week;
}
function dateKey(d) {
  d = d || new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return y + "-" + m + "-" + dd;
}
function isoToDate(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}

const WK = weekId();
const KEYS = {
  log: "worklog:" + WK,
  intake: "intake",
  weights: "weights",
  customFoods: "customFoods"
};

function load() {
  try { STATE.log = JSON.parse(localStorage.getItem(KEYS.log) || "{}"); } catch(e) {}
  try { STATE.intake = JSON.parse(localStorage.getItem(KEYS.intake) || "{}"); } catch(e) {}
  try { STATE.weights = JSON.parse(localStorage.getItem(KEYS.weights) || "[]"); } catch(e) {}
  try { STATE.customFoods = JSON.parse(localStorage.getItem(KEYS.customFoods) || "[]"); } catch(e) {}
}
function persist(key) {
  try {
    const val = key === "log" ? STATE.log : key === "intake" ? STATE.intake :
                key === "weights" ? STATE.weights : STATE.customFoods;
    localStorage.setItem(KEYS[key], JSON.stringify(val));
    flashSaved();
  } catch(e) { console.error("save failed", e); }
}
function flashSaved() {
  const s = document.getElementById("saved");
  s.classList.add("show");
  clearTimeout(window._st);
  window._st = setTimeout(() => s.classList.remove("show"), 1100);
}

/* =========

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
}
function el(html) {
  const t = document.createElement("template");
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

function todaysIntake() {
  const k = dateKey();
  return STATE.intake[k] || [];
}
function dayTotals(items) {
  let k = 0, p = 0;
  items.forEach(it => { k += Number(it.kcal) || 0; p += Number(it.protein) || 0; });
  return { kcal: k, protein: p };
}

function renderIntake(root) {
  const items = todaysIntake();
  const tot = dayTotals(items);
  const kPct = Math.min(100, Math.round(tot.kcal / TARGET_KCAL * 100));
  const pPct = Math.min(100, Math.round(tot.protein / TARGET_PROTEIN * 100));
  const kOver = tot.kcal > TARGET_KCAL * 1.1;
  const pOver = tot.protein > TARGET_PROTEIN * 1.2;

  // Summary card
  const summary = document.createElement("div");
  summary.className = "card";

    '<div class="card-head"><span class="card-title">Today</span><span class="card-sub">' + dateKey() + '</span></div>'

      + '<div class="progress-bar"><div class="progress-fill ' + (kOver ? "over" : "") + '" style="width:' + kPct + '%"></div></div>'
    + '</div>'
    + '<div class="progress-wrap" style="padding-top:0">'
      + '<div class="progress-label"><span>Protein</span><span><b>' + tot.protein + '</b> / ' + TARGET_PROTEIN + ' g</span></div>'
      + '<div class="progress-bar"><div class="progress-fill ' + (pOver ? "over" : "") + '" style="width:' + pPct + '%"></div></div>'
    + '</div>';
  root.appendChild(summary);

  // Quick add buttons
  const addCard = document.createElement("div");
  addCard.className = "card pad-b";
  addCard.innerHTML =
    '<div class="card-head"><span class="card-title">Add a meal</span></div>'
    + '<div class="add-row" style="flex-wrap:wrap; gap:6px;">'
      + '<button class="btn btn-sm" id="add-template">From plan</button>'
      + '<button class="btn btn-sm btn-ghost" id="add-custom">My foods</button>'
      + '<button class="btn btn-sm btn-ghost" id="add-quick">Quick entry</button>'
    + '</div>';
  root.appendChild(addCard);

  document.getElementById("add-template").onclick = () => openTemplateModal();
  document.getElementById("add-custom").onclick = () => openCustomFoodModal();
  document.getElementById("add-quick").onclick = () => openQuickEntryModal();

  // Today's entries
  const log = document.createElement("div");
  log.className = "card";
  log.innerHTML = '<div class="card-head"><span class="card-title">Logged today</span></div>';
  if (items.length === 0) {
    log.appendChild(el('<div class="empty">Nothing logged yet today.</div>'));
  } else {
    items.forEach((it, i) => {
      const row = el(
        '<div class="log-item">'
        + '<div>' + esc(it.name) + '<div class="macros">' + it.kcal + ' kcal · ' + it.protein + ' g protein</div></div>'
        + '<button class="x-btn" data-i="' + i + '">×</button>'
        + '</div>'
      );
      log.appendChild(row);
    });
  }
  root.appendChild(log);

  log.querySelectorAll(".x-btn").forEach(btn => {
    btn.onclick = () => {
      const i = Number(btn.dataset.i);
      const k = dateKey();
      STATE.intake[k].splice(i, 1);
      if (STATE.intake[k].length === 0) delete STATE.intake[k];
      persist("intake");
      render();
    };
  });
}

function addIntake(name, kcal, protein) {
  const k = dateKey();
  if (!STATE.intake[k]) STATE.intake[k] = [];
  STATE.intake[k].push({ name, kcal: Number(kcal), protein: Number(protein) });
  persist("intake");
}

   ========= */

function avg(arr) { return arr.reduce((a,b)=>a+b,0) / arr.length; }

function renderStats(root) {
  // Weight section
  const weightCard = document.createElement("div");
  weightCard.className = "card pad-b";
  weightCard.innerHTML =
    '<div class="card-head"><span class="card-title">Weight</span>'
    + '<button class="btn btn-sm" id="add-weight">+ Log</button></div>';

  if (STATE.weights.length === 0) {
    weightCard.appendChild(el('<div class="empty">No weights logged yet. Tap "+ Log" to start.</div>'));
  } else {
    const latest = STATE.weights[STATE.weights.length - 1];
    const first = STATE.weights[0];
    const diff = (latest.kg - first.kg).toFixed(1);
    const diffStr = diff >= 0 ? "+" + diff : diff;

    // Chart
    const w = 420, h = 140, pad = 24;
    const xs = STATE.weights.map(w => isoToDate(w.date).getTime());
    const ys = STATE.weights.map(w => w.kg);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    let minY = Math.min(...ys, GOAL_WEIGHT) - 1;
    let maxY = Math.max(...ys, GOAL_WEIGHT) + 1;
    if (maxY - minY < 4) { const c = (maxY+minY)/2; minY = c - 2; maxY = c + 2; }
    const sx = x => minX === maxX ? w/2 : pad + (x-minX)/(maxX-minX) * (w-2*pad);
    const sy = y => h - pad - (y-minY)/(maxY-minY) * (h-2*pad);

    let pts = "", dots = "";
    STATE.weights.forEach(w0 => {
      const x = sx(isoToDate(w0.date).getTime());
      const y = sy(w0.kg);
      pts += (pts ? " L " : "M ") + x.toFixed(1) + " " + y.toFixed(1);
      dots += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="3.5" fill="#1c1917"/>';
    });
    const goalY = sy(GOAL_WEIGHT);
    const chartHTML = '<div class="chart-wrap"><svg class="chart" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">'
      + '<line x1="' + pad + '" y1="' + goalY + '" x2="' + (w-pad) + '" y2="' + goalY + '" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 4"/>'
      + '<text x="' + (w-pad) + '" y="' + (goalY-5) + '" text-anchor="end" font-size="10" fill="#16a34a">Goal ' + GOAL_WEIGHT + ' kg</text>'
      + '<path d="' + pts + '" fill="none" stroke="#1c1917" stroke-width="2"/>'
      + dots
      + '</svg></div>';
    weightCard.appendChild(el(chartHTML));

    weightCard.appendChild(el(
      '<div class="stat-row"><span>Current</span><b>' + latest.kg + ' kg</b></div>'
      + '<div class="stat-row"><span>Change since first entry</span><b>' + diffStr + ' kg</b></div>'
      + '<div class="stat-row"><span>To goal (' + GOAL_WEIGHT + ' kg)</span><b>' + (GOAL_WEIGHT - latest.kg).toFixed(1) + ' kg</b></div>'
    ));

    // Recent entries
    const recent = STATE.weights.slice(-5).reverse();
    let recentHTML = '<div style="font-size:11px;font-weight:600;color:#a8a29e;padding:10px 16px 4px;text-transform:uppercase;letter-spacing:0.5px;">Recent</div>';
    recent.forEach((w0, i) => {
      recentHTML += '<div class="log-item"><div>' + w0.date + '</div>'
        + '<div class="right"><span>' + w0.kg + ' kg</span>'
        + '<button class="x-btn" data-w-del="' + w0.date + '">×</button></div></div>';
    });
    weightCard.appendChild(el(recentHTML));
  }
  root.appendChild(weightCard);

  document.getElementById("add-weight").onclick = openWeightModal;
  root.querySelectorAll("[data-w-del]").forEach(b => {
    b.onclick = () => {
      const d = b.dataset.wDel;
      STATE.weights = STATE.weights.filter(w => w.date !== d);
      persist("weights");
      render();
    };
  });

  // Smart feedback banner
  root.appendChild(renderFeedback());

  // Intake — 7-day average
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = dateKey(d);
    const tot = dayTotals(STATE.intake[k] || []);
    last7.push({ date: k, ...tot });
  }
  const daysLogged = last7.filter(d => d.kcal > 0);
  const avgK = daysLogged.length ? Math.round(avg(daysLogged.map(d => d.kcal))) : 0;
  const avgP = daysLogged.length ? Math.round(avg(daysLogged.map(d => d.protein))) : 0;

  const intakeCard = document.createElement("div");
  intakeCard.className = "card";
  intakeCard.innerHTML =
    '<div class="card-head"><span class="card-title">Intake — last 7 days</span><span class="card-sub">' + daysLogged.length + '/7 days logged</span></div>';
  if (daysLogged.length === 0) {
    intakeCard.appendChild(el('<div class="empty">Log meals in the Today tab to see averages here.</div>'));
  } else {
    intakeCard.appendChild(el(
      '<div class="stat-row"><span>Average calories</span><b>' + avgK + ' / ' + TARGET_KCAL + ' kcal</b></div>'
      + '<div class="stat-row"><span>Average protein</span><b>' + avgP + ' / ' + TARGET_PROTEIN + ' g</b></div>'
    ));
  }
  root.appendChild(intakeCard);
}

function renderFeedback() {
  // Need at least 2 weights spanning 10+ days for a trend
  if (STATE.weights.length < 2) {
    return el('<div class="info-yellow"><strong>Need more data.</strong> Log your weight weekly for 2–3 weeks to see whether you\'re actually gaining.</div>');
  }
  const sorted = [...STATE.weights].sort((a,b) => a.date.localeCompare(b.date));
  const first = sorted[0], last = sorted[sorted.length - 1];
  const days = (isoToDate(last.date) - isoToDate(first.date)) / 86400000;
  if (days < 10) {
    return el('<div class="info-yellow"><strong>Need more time.</strong> A clear weight trend needs at least 10 days of data — yours covers ' + Math.round(days) + ' days.</div>');
  }
  const totalGain = last.kg - first.kg;
  const perWeek = (totalGain / days) * 7;

  if (perWeek >= 0.25 && perWeek <= 0.6) {
    return el('<div class="info-green"><strong>On track.</strong> Gaining ' + perWeek.toFixed(2) + ' kg/week over ' + Math.round(days) + ' days. Keep doing what you\'re doing.</div>');
  }
  if (perWeek > 0.6) {
    return el('<div class="info-yellow"><strong>Gaining fast.</strong> ' + perWeek.toFixed(2) + ' kg/week is above the ideal 0.25–0.5 — likely more fat than necessary. Drop ~200 kcal/day.</div>');
  }
  if (perWeek < 0.1 && perWeek > -0.1) {
    return el('<div class="info-red"><strong>Weight is flat.</strong> Over ' + Math.round(days) + ' days you\'ve changed by ' + totalGain.toFixed(1) + ' kg. You\'re likely undereating — add ~200 kcal/day (a Power Shake is the easiest fix).</div>');
  }
  if (perWeek < 0) {
    return el('<div class="info-red"><strong>Losing weight.</strong> Down ' + Math.abs(totalGain).toFixed(1) + ' kg over ' + Math.round(days) + ' days. You\'re in a deficit — add ~300 kcal/day.</div>');
  }
  return el('<div class="info-yellow"><strong>Slow progress.</strong> Gaining only ' + perWeek.toFixed(2) + ' kg/week. Add ~200 kcal/day for 2 weeks and reassess.</div>');
}

/* =========
   ROOT RENDER
   ========= */

function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  if (STATE.page === "workout") renderWorkout(root);
  else if (STATE.page === "meals") renderMeals(root);
  else if (STATE.page === "intake") renderIntake(root);
  else if (STATE.page === "stats") renderStats(root);
}

document.querySelectorAll(".tabbtn").forEach(b => {
  b.addEventListener("click", () => navigate(b.dataset.page));
});

load();
navigate("workout");
</script>
