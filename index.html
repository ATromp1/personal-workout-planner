<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fafaf9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Logger</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1c1917;
    background: #fafaf9;
    min-height: 100%;
  }
  body { padding-bottom: 40px; }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { padding: 20px 18px 14px; }
  h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { font-size: 12.5px; color: #78716c; margin-top: 3px; }
  .tabs {
    display: flex; gap: 6px; padding: 0 12px 8px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; padding: 8px 13px; border-radius: 999px;
    border: 1px solid #e7e5e4; background: #fff; color: #57534e;
    font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .tab.active { color: #fff; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 16px 0; font-size: 11.5px; color: #a8a29e;
  }
  .saved { color: #16a34a; font-weight: 600; opacity: 0; transition: opacity .3s; }
  .saved.show { opacity: 1; }
  .card {
    background: #fff; margin: 12px 12px 0; border-radius: 14px;
    border: 1px solid #ececea; overflow: hidden; padding-bottom: 8px;
  }
  .ex-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 14px 8px; gap: 8px;
  }
  .ex-name-wrap { display: flex; align-items: center; gap: 7px; min-width: 0; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .info-btn {
    flex: 0 0 auto; width: 19px; height: 19px; border-radius: 50%;
    border: 1px solid #d6d3d1; background: #fff; color: #78716c;
    font-size: 12px; font-weight: 700; font-style: italic;
    line-height: 1; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .info-btn.open { background: #1c1917; color: #fff; border-color: #1c1917; }
  .ex-target { font-size: 12px; color: #a8a29e; font-weight: 500; flex: 0 0 auto; }
  .how {
    display: none; margin: 0 14px 6px; padding: 10px 12px;
    background: #f7f6f4; border: 1px solid #ececea; border-radius: 10px;
    font-size: 13px; line-height: 1.5; color: #44403c;
  }
  .how.show { display: block; }
  .how .muscle {
    display: block; margin-top: 6px; font-size: 11.5px;
    color: #a8a29e; font-weight: 600;
  }
  .set-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px; }
  .set-label { font-size: 12px; color: #a8a29e; width: 42px; font-weight: 600; }
  .inp {
    flex: 1; min-width: 0; padding: 10px; font-size: 16px;
    border: 1px solid #e7e5e4; border-radius: 9px; background: #fafaf9;
    color: #1c1917; outline: none; text-align: center;
  }
  .inp:focus { border-color: #a8a29e; background: #fff; }
  .banner {
    margin: 12px 12px 0; padding: 16px; border-radius: 14px;
    background: #f5f3ff; border: 1px solid #e9d5ff; color: #6b21a8; font-size: 14px;
  }
  .banner ul { margin: 8px 0 0; padding-left: 18px; }
  .banner li { margin: 5px 0; line-height: 1.5; }
  .rest {
    margin: 12px 12px 0; padding: 20px 16px; border-radius: 14px;
    background: #f5f5f4; border: 1px solid #e7e5e4; color: #57534e;
    font-size: 14px; text-align: center;
  }
  .foot {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px 0; font-size: 11.5px; color: #a8a29e;
  }
  .reset {
    background: none; border: none; color: #a8a29e; font-size: 12px;
    text-decoration: underline; cursor: pointer; padding: 4px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Workout Logger</h1>
    <div class="sub">Beginner muscle-building · 4 lift days + recovery</div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="meta">
    <span id="meta-text"></span>
    <span class="saved" id="saved">✓ Saved</span>
  </div>
  <div id="content"></div>
  <div class="foot">
    <span>Tap the ⓘ on any exercise for how-to.</span>
    <button class="reset" id="reset">Reset week</button>
  </div>
</div>

<script>
const PROGRAM = {
  mon: { name: "Monday", focus: "Upper Body A", accent: "#2563eb", exercises: [
    { id: "m1", name: "DB bench press", target: "3 × 8-10", sets: 3,
      how: "Lie on your back on the bench, a dumbbell in each hand at chest level. Press them straight up until your arms are extended, then lower under control.",
      muscle: "Chest, front shoulders, triceps" },
    { id: "m2", name: "One-arm DB row", target: "3 × 10/side", sets: 3,
      how: "Put one knee and the same-side hand on the bench so your back is flat and roughly parallel to the floor. With the other hand, pull the dumbbell up toward your hip, then lower. Do all reps, then switch sides.",
      muscle: "Back, biceps" },
    { id: "m3", name: "DB shoulder press", target: "3 × 10", sets: 3,
      how: "Seated upright, dumbbells at shoulder height. Press straight overhead until arms extend, then lower back to shoulders.",
      muscle: "Shoulders, triceps" },
    { id: "m4", name: "DB bicep curl", target: "2 × 12", sets: 2,
      how: "Dumbbells at your sides, palms facing forward. Bend at the elbow to curl them up toward your shoulders, then lower under control.",
      muscle: "Biceps" },
    { id: "m5", name: "DB skull crusher", target: "2 × 12", sets: 2,
      how: "Lie on the bench, arms pointing straight up with a dumbbell in each hand. Bend only at the elbows to lower the weights toward your forehead, then extend back up. Control the weight — that is all the name means.",
      muscle: "Triceps" } ] },
  tue: { name: "Tuesday", focus: "Lower Body A", accent: "#16a34a", exercises: [
    { id: "t1", name: "Goblet squat", target: "3 × 10-12", sets: 3,
      how: "Hold one dumbbell (or the kettlebell) vertically against your chest with both hands, like a goblet. Squat down keeping your chest up, then stand.",
      muscle: "Quads, glutes" },
    { id: "t2", name: "DB Romanian deadlift", target: "3 × 10", sets: 3,
      how: "Stand holding dumbbells in front of your thighs, knees only slightly bent. Push your hips backward and let the dumbbells slide down your legs, keeping your back flat — feel a hamstring stretch. Stand up by squeezing your glutes. Hips move back, not down.",
      muscle: "Hamstrings, glutes" },
    { id: "t3", name: "DB walking lunge", target: "3 × 10/side", sets: 3,
      how: "A dumbbell in each hand at your sides. Step forward into a lunge until both knees are about 90°, then step through with the other leg and repeat — walking forward.",
      muscle: "Legs, glutes" },
    { id: "t4", name: "DB calf raise", target: "3 × 15", sets: 3,
      how: "Stand holding dumbbells. Push up onto the balls of your feet as high as you can, then lower slowly. Standing on the edge of a step gives a deeper stretch.",
      muscle: "Calves" },
    { id: "t5", name: "Plank", target: "3 × 40s", sets: 3,
      how: "Face-down, weight on your forearms and toes, body in a straight rigid line. Hold still for the time shown — don't let your hips sag or pike up.",
      muscle: "Core" } ] },
  wed: { name: "Wednesday", focus: "Active Recovery", accent: "#9333ea", recovery: [
    "Kettlebell swings — 5 × 15", "Mobility / stretching — 15 min",
    "Optional brisk walk", "Light core work" ] },
  thu: { name: "Thursday", focus: "Upper Body B", accent: "#2563eb", exercises: [
    { id: "h1", name: "Incline DB press", target: "3 × 8-10", sets: 3,
      how: "Same as a bench press, but set the backrest to an incline (about 30–45°). The angle shifts the work toward your upper chest.",
      muscle: "Upper chest, shoulders, triceps" },
    { id: "h2", name: "DB chest-supported row", target: "3 × 10", sets: 3,
      how: "Lie face-down on an inclined bench so your chest is supported, a dumbbell hanging from each hand. Pull both up toward your hips, then lower.",
      muscle: "Back, biceps" },
    { id: "h3", name: "DB lateral raise", target: "3 × 12", sets: 3,
      how: "Stand with a dumbbell in each hand at your sides. With a slight elbow bend, raise both arms out to the sides until roughly shoulder height — like wings — then lower slowly. Keep the weight light.",
      muscle: "Side shoulders" },
    { id: "h4", name: "Hammer curl", target: "2 × 12", sets: 2,
      how: "Like a bicep curl, but your palms face each other the whole time, as if holding two hammers. Curl up, then lower under control.",
      muscle: "Biceps, forearms" },
    { id: "h5", name: "DB overhead extension", target: "2 × 12", sets: 2,
      how: "Seated or standing, hold one dumbbell with both hands overhead. Lower it behind your head by bending the elbows, then extend back up.",
      muscle: "Triceps" } ] },
  fri: { name: "Friday", focus: "Lower Body B", accent: "#16a34a", exercises: [
    { id: "f1", name: "DB Bulgarian split squat", target: "3 × 8/side", sets: 3,
      how: "Stand a stride-length in front of the bench, resting the top of one foot behind you on it. Lower straight down on the front leg, then drive back up. The hardest leg move here — start light or with no weight.",
      muscle: "Quads, glutes" },
    { id: "f2", name: "DB deadlift", target: "3 × 10", sets: 3,
      how: "Dumbbells start on the floor beside your feet. Hinge at the hips and bend the knees to pick them up, stand up tall, then lower them back down with a flat back.",
      muscle: "Whole posterior chain" },
    { id: "f3", name: "DB step-up", target: "3 × 10/side", sets: 3,
      how: "Stand facing the bench, dumbbells at your sides. Step one foot fully onto the bench and drive up until standing on it, then step back down. Switch sides.",
      muscle: "Legs, glutes" },
    { id: "f4", name: "DB hip thrust", target: "3 × 12", sets: 3,
      how: "Sit on the floor with your upper back against the bench, a dumbbell across your hips (a folded towel under it helps). Drive your hips up until your body is a flat tabletop, squeeze your glutes, then lower.",
      muscle: "Glutes" },
    { id: "f5", name: "Lying leg raise", target: "3 × 12", sets: 3,
      how: "Lie flat on your back, legs straight, hands under your lower back or beside you. Raise both legs toward the ceiling, then lower slowly without letting them touch the floor.",
      muscle: "Lower abs" } ] },
  sat: { name: "Weekend", focus: "Full Rest", accent: "#78716c", rest: true }
};
const DAY_ORDER = ["mon", "tue", "wed", "thu", "fri", "sat"];

function todayKey() {
  const map = { 1:"mon", 2:"tue", 3:"wed", 4:"thu", 5:"fri", 6:"sat", 0:"sat" };
  return map[new Date().getDay()];
}
function weekId() {
  const d = new Date();
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
  return d.getFullYear() + "-w" + week;
}

const WK = weekId();
const STORAGE_KEY = "worklog:" + WK;
let log = {};
let activeDay = todayKey();
const openHints = {};

function loadLog() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    log = raw ? JSON.parse(raw) : {};
  } catch (e) { log = {}; }
}
function saveLog() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(log));
    const s = document.getElementById("saved");
    s.classList.add("show");
    clearTimeout(window._st);
    window._st = setTimeout(() => s.classList.remove("show"), 1100);
  } catch (e) { console.error("save failed", e); }
}

function onInput(exId, setIdx, field, value) {
  if (!log[exId]) log[exId] = {};
  if (!log[exId][setIdx]) log[exId][setIdx] = {};
  log[exId][setIdx][field] = value;
  saveLog();
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
}

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = "";
  DAY_ORDER.forEach(k => {
    const b = document.createElement("button");
    b.className = "tab" + (k === activeDay ? " active" : "");
    b.textContent = PROGRAM[k].name;
    if (k === activeDay) { b.style.background = PROGRAM[k].accent; b.style.borderColor = PROGRAM[k].accent; }
    b.onclick = () => { activeDay = k; render(); };
    el.appendChild(b);
  });
}

function render() {
  renderTabs();
  const day = PROGRAM[activeDay];
  document.getElementById("meta-text").textContent =
    day.focus + " · week " + WK.replace(/^\d+-w/, "");
  const c = document.getElementById("content");
  c.innerHTML = "";

  if (day.rest) {
    c.innerHTML = '<div class="rest"><strong>Full rest — Saturday &amp; Sunday.</strong>'
      + '<div style="margin-top:6px">Muscle is built during recovery. Light activity is fine. '
      + 'Prioritise 7–9 hours of sleep.</div></div>';
    return;
  }
  if (day.recovery) {
    let li = day.recovery.map(r => "<li>" + esc(r) + "</li>").join("");
    c.innerHTML = '<div class="banner"><strong>Active recovery day</strong><ul>' + li + '</ul></div>';
    return;
  }

  day.exercises.forEach(ex => {
    const card = document.createElement("div");
    card.className = "card";
    const isOpen = !!openHints[ex.id];
    let html = '<div class="ex-head"><span class="ex-name-wrap">'
      + '<span class="ex-name">' + esc(ex.name) + '</span>'
      + '<button class="info-btn' + (isOpen ? " open" : "") + '" data-info="' + ex.id + '" '
      + 'aria-label="How to do ' + esc(ex.name) + '">i</button>'
      + '</span><span class="ex-target">' + esc(ex.target) + '</span></div>';
    html += '<div class="how' + (isOpen ? " show" : "") + '" id="how-' + ex.id + '">'
      + esc(ex.how) + '<span class="muscle">Works: ' + esc(ex.muscle) + '</span></div>';
    for (let i = 0; i < ex.sets; i++) {
      const entry = (log[ex.id] && log[ex.id][i]) || {};
      html += '<div class="set-row"><span class="set-label">Set ' + (i+1) + '</span>'
        + '<input class="inp" inputmode="decimal" placeholder="kg" '
        + 'data-ex="' + ex.id + '" data-set="' + i + '" data-field="weight" '
        + 'value="' + esc(entry.weight || "") + '">'
        + '<input class="inp" inputmode="numeric" placeholder="reps" '
        + 'data-ex="' + ex.id + '" data-set="' + i + '" data-field="reps" '
        + 'value="' + esc(entry.reps || "") + '"></div>';
    }
    card.innerHTML = html;
    c.appendChild(card);
  });

  c.querySelectorAll("input.inp").forEach(inp => {
    inp.addEventListener("input", e => {
      onInput(e.target.dataset.ex, e.target.dataset.set,
              e.target.dataset.field, e.target.value);
    });
  });
  c.querySelectorAll("button.info-btn").forEach(btn => {
    btn.addEventListener("click", e => {
      const id = e.currentTarget.dataset.info;
      openHints[id] = !openHints[id];
      const panel = document.getElementById("how-" + id);
      panel.classList.toggle("show", openHints[id]);
      e.currentTarget.classList.toggle("open", openHints[id]);
    });
  });
}

document.getElementById("reset").onclick = () => {
  if (!confirm("Clear all entries for this week?")) return;
  log = {};
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({})); } catch (e) {}
  render();
};

loadLog();
render();
</script>
</body>
</html>
